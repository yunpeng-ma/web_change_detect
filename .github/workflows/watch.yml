name: Watch Website

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required configuration
        run: |
          missing=0
          for name in URL SMTP_HOST SMTP_USERNAME SMTP_PASSWORD EMAIL_TO; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set. Add it in Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          exit "$missing"
        env:
          URL: ${{ secrets.URL || vars.URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || vars.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME || vars.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || vars.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || vars.EMAIL_TO }}

      - name: Check website once
        run: |
          python main.py --once \
            --quiet-start-hour "${QUIET_START_HOUR}" \
            --quiet-end-hour "${QUIET_END_HOUR}" \
            --max-random-delay-seconds "${MAX_RANDOM_DELAY_SECONDS}"
        env:
          URL: ${{ secrets.URL || vars.URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || vars.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME || vars.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || vars.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || vars.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || vars.EMAIL_TO }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          SCRAPINGBEE_RENDER_JS: ${{ vars.SCRAPINGBEE_RENDER_JS || 'false' }}
          # Quiet hours use 24-hour time: 0 is midnight/12 AM, 6 is 6 AM,
          # 12 is noon/12 PM, and 23 is 11 PM. The start hour is included
          # and the end hour is excluded, so 0-6 skips 00:00 through 05:59.
          QUIET_START_HOUR: ${{ vars.QUIET_START_HOUR || '0' }}
          QUIET_END_HOUR: ${{ vars.QUIET_END_HOUR || '6' }}
          MAX_RANDOM_DELAY_SECONDS: ${{ vars.MAX_RANDOM_DELAY_SECONDS || '300' }}
          TZ: ${{ vars.TZ || 'Europe/Stockholm' }}

      - name: Commit updated watcher state
        run: |
          git add last_state.txt
          if git diff --staged --quiet; then
            echo "No watcher state changes to commit."
          else
            git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "Update watcher state"
            git push
          fi
